[platformio]
lib_dir = src
default_envs = teensy41

[common_env_data]
build_flags =
  -Isrc
lib_deps_builtin =
  SPI
  Wire
lib_deps_external =
    https://github.com/janelia-arduino/WatchdogTeensy4.git#0.1.0
    https://github.com/janelia-arduino/TimerOne.git#1.2.0
    https://github.com/janelia-arduino/TimerThree.git#1.1.1
    https://github.com/janelia-arduino/qp-arduino.git#v6.9.9
    https://github.com/janelia-arduino/SdFat.git#2.1.3
    https://github.com/janelia-arduino/Adafruit_BusIO.git#1.17.2
    https://github.com/janelia-arduino/Adafruit_MCP4728.git#1.0.9
    https://github.com/janelia-arduino/Adafruit_ADS1X15.git#2.6.0
    https://github.com/janelia-arduino/Time.git#v1.6.1
lib_deps_local =
  src/ArenaController
lib_deps_qnethernet =
  https://github.com/ssilverman/QNEthernet.git#v0.35.0

[env]
lib_ldf_mode = off
build_flags =
  ${common_env_data.build_flags}
lib_deps =
  ${common_env_data.lib_deps_builtin}
  ${common_env_data.lib_deps_external}
  ${common_env_data.lib_deps_local}

[env:teensy41]
platform = teensy
framework = arduino
board = teensy41
upload_protocol = teensy-cli


; ------------------------------------------------------------------------------
; Alternate env for benchmarking QNEthernet vs Mongoose.
; Build with: pio run -e teensy41_qnethernet
; ------------------------------------------------------------------------------
[env:teensy41_qnethernet]
platform = teensy
framework = arduino
board = teensy41
upload_protocol = teensy-cli

lib_ldf_mode = off

build_flags =
    ${common_env_data.build_flags}
    -DAC_ETH_BACKEND=1

; The QNEthernet build does not use the vendored Mongoose sources that live in
; the example directory. Excluding them keeps the build clean and avoids
; dragging in an unused second stack.
build_src_filter =
    +<*>
    -<mongoose.c>
    -<mongoose_fs.c>
    -<mongoose_glue.c>
    -<mongoose_impl.c>

lib_deps =
    ${common_env_data.lib_deps_builtin}
    ${common_env_data.lib_deps_external}
    ${common_env_data.lib_deps_local}
    ${common_env_data.lib_deps_qnethernet}
